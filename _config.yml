description: "Welcome to Xiaoyi's homepage! About Me: I'm Xiaoyi Gu, attracted by Machine Learning when I was a sophomore in a Data Mining course, I am fighting my way to start a career in this area. Using the known to explore the unknown, like panning for gold in the sand, I believe, is part of data science's charm. Also, I'm always hoping to perceive another form of the world through modern computer technology. To build my own knowledge kingdom of technology, I will always explore opportunities and never stop learning.In my internships and coursework, I gained experience in **Recommendation Systems, Machine Learning, Application Development, LLMs, Product Analytics, NLP, Knowledge Graph** and so on. When successfully implementing an app with my ideas, mining patterns that empower the business and delivering insights to professionals or non-professionals, I have a sense of achievement. This is my life motivation."
